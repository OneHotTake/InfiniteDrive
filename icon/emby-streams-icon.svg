<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <!-- Background gradient: deep navy to dark teal -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a2a2a;stop-opacity:1" />
    </linearGradient>

    <!-- Green stream gradient -->
    <linearGradient id="streamGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#00e5a0;stop-opacity:0" />
      <stop offset="25%"  style="stop-color:#00e5a0;stop-opacity:1" />
      <stop offset="75%"  style="stop-color:#52ffce;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#52ffce;stop-opacity:0" />
    </linearGradient>

    <!-- Cyan stream gradient -->
    <linearGradient id="streamGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#00c8ff;stop-opacity:0" />
      <stop offset="30%"  style="stop-color:#00c8ff;stop-opacity:0.85" />
      <stop offset="80%"  style="stop-color:#00e5a0;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#00e5a0;stop-opacity:0" />
    </linearGradient>

    <!-- Faint green stream -->
    <linearGradient id="streamGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#00e5a0;stop-opacity:0" />
      <stop offset="35%"  style="stop-color:#00e5a0;stop-opacity:0.55" />
      <stop offset="85%"  style="stop-color:#52ffce;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#52ffce;stop-opacity:0" />
    </linearGradient>

    <!-- Play button gradient -->
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b0ffe0;stop-opacity:1" />
    </linearGradient>

    <!-- Glow for streams -->
    <filter id="streamGlow" x="-5%" y="-200%" width="110%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow for play button -->
    <filter id="playGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="55%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.6" />
    </radialGradient>

    <clipPath id="iconClip">
      <rect width="800" height="450" rx="36" ry="36"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="36" ry="36" fill="url(#bgGrad)"/>

  <!-- Dot grid texture -->
  <g clip-path="url(#iconClip)" opacity="0.06">
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.5" fill="#ffffff"/>
    </pattern>
    <rect width="800" height="450" fill="url(#dots)"/>
  </g>

  <!-- === STREAM WAVES === spanning full width -->
  <g clip-path="url(#iconClip)" filter="url(#streamGlow)">

    <!-- Stream 1 — uppermost, thin cyan -->
    <path d="M 0 168
             C 120 155, 240 192, 380 178
             C 500 166, 640 148, 800 158"
          fill="none" stroke="url(#streamGrad2)" stroke-width="4" stroke-linecap="round" opacity="0.55"/>

    <!-- Stream 2 — upper green -->
    <path d="M 0 200
             C 130 186, 250 225, 390 210
             C 520 196, 660 178, 800 190"
          fill="none" stroke="url(#streamGrad1)" stroke-width="8" stroke-linecap="round" opacity="0.85"/>

    <!-- Stream 3 — center-upper -->
    <path d="M 0 228
             C 120 218, 240 252, 390 238
             C 530 224, 660 210, 800 222"
          fill="none" stroke="url(#streamGrad2)" stroke-width="6" stroke-linecap="round" opacity="0.7"/>

    <!-- Stream 4 — center MAIN (boldest) -->
    <path d="M 0 260
             C 110 252, 230 284, 390 268
             C 545 254, 672 244, 800 256"
          fill="none" stroke="url(#streamGrad1)" stroke-width="14" stroke-linecap="round" opacity="1"/>

    <!-- Stream 5 — center-lower -->
    <path d="M 0 292
             C 120 284, 245 315, 390 300
             C 540 286, 668 278, 800 288"
          fill="none" stroke="url(#streamGrad2)" stroke-width="8" stroke-linecap="round" opacity="0.80"/>

    <!-- Stream 6 — lower green -->
    <path d="M 0 322
             C 130 312, 255 342, 392 328
             C 535 315, 665 308, 800 316"
          fill="none" stroke="url(#streamGrad1)" stroke-width="6" stroke-linecap="round" opacity="0.6"/>

    <!-- Stream 7 — lowest, faint -->
    <path d="M 0 352
             C 140 342, 265 366, 395 354
             C 535 342, 665 337, 800 344"
          fill="none" stroke="url(#streamGrad3)" stroke-width="4" stroke-linecap="round" opacity="0.38"/>

  </g>

  <!-- === PLAY BUTTON — centered on canvas === -->
  <g filter="url(#playGlow)">
    <circle cx="400" cy="260" r="80" fill="#00e5a0" opacity="0.12"/>
    <circle cx="400" cy="260" r="58" fill="#00e5a0" opacity="0.10"/>
  </g>

  <!-- Play triangle -->
  <polygon
    points="370,215 370,305 448,260"
    fill="url(#playGrad)"
    opacity="0.97"
    filter="url(#playGlow)"
  />

  <!-- Vignette -->
  <rect width="800" height="450" rx="36" ry="36" fill="url(#vignette)"/>

  <!-- Border highlight -->
  <rect width="800" height="450" rx="36" ry="36"
        fill="none" stroke="#00e5a0" stroke-width="2" opacity="0.18"/>
</svg>
